name: Feature request
description: Propose a platform capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Large architectural changes should start as an ADR draft — see [`docs/adr/README.md`](../docs/adr/README.md) and [`CONTRIBUTING.md`](../CONTRIBUTING.md#adr-process).

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What operational or architectural problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the change and its expected behaviour.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why you ruled them out.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Affected Terraform env
      multiple: true
      options:
        - bootstrap
        - platform
        - regional
        - CI / GitHub Actions
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to ADRs, runbooks, cost estimates, or related issues.
    validations:
      required: false
