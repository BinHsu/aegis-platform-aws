version: 2

# Dependabot keeps pinned versions current — GitHub Actions SHAs / tags and
# Terraform provider + module constraints. PRs land like any other change:
# infra-plan.yml runs fmt/validate/lint/sec/plan, branch protection gates
# the merge.
#
# Terraform ecosystems ignore semver-major: a major bump of an upstream
# module (terraform-aws-modules vpc/eks/iam) carries renamed inputs and
# restructured outputs, and can force replacement of live infrastructure
# (an EKS cluster recreate). That is a deliberate, tested migration — not a
# routine auto-merge. Dependabot still proposes minor/patch.

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  - package-ecosystem: terraform
    directory: /terraform/envs/bootstrap
    schedule:
      interval: weekly
    commit-message:
      prefix: "tf"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: terraform
    directory: /terraform/envs/platform
    schedule:
      interval: weekly
    commit-message:
      prefix: "tf"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: terraform
    directory: /terraform/envs/regional
    schedule:
      interval: weekly
    commit-message:
      prefix: "tf"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: terraform
    directory: /terraform/modules/regional-stack
    schedule:
      interval: weekly
    commit-message:
      prefix: "tf"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
