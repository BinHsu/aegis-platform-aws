name: infra-apply-account

# W3 reusable engine — applies the platform + regional stacks to ONE account at a
# pinned git ref. Callers (infra-staging.yml, infra-prod.yml) supply the account
# dimension; this workflow does version-gate -> apply-platform -> apply-regional.
#
# HEAD-vs-tag: the caller reads accounts.json from HEAD and passes account_id / ref /
# regions_json / overrides_json here; THIS workflow `checkout`s `ref` (main for staging,
# a release tag for prod) and applies that tree. role + state bucket are DERIVED from
# account_id (no per-account secret), inlined at each use — reusable top-level `env`
# cannot reliably read `inputs`. See docs/runbooks/2026-06-12-joint-strike.md §W3.

on:
  workflow_call:
    inputs:
      account_id:     { type: string,  required: true }   # target AWS account
      ref:            { type: string,  required: true }    # main (staging) | release tag (prod)
      regions_json:   { type: string,  required: true }    # JSON array, e.g. ["eu-central-1"]
      overrides_json: { type: string,  required: false, default: '{}' }  # sizing override object
      gate_blocks:    { type: boolean, required: false, default: false }  # true=prod (gate HARD-FAILS the run before any apply), false=staging (warn-only)
      environment:    { type: string,  required: false, default: 'prod' }   # workload overlay selector (staging|prod) → TF_VAR_environment; from HEAD accounts.json
      bootstrap_complete: { type: boolean, required: false, default: false } # per-account flag from HEAD accounts.json; false → skip all applies (fail-safe default)
      operator_principal_arn: { type: string, required: true }    # per-account SSO PlatformAdmin ARN (EKS operator access entry) — from HEAD accounts.json; a single repo secret cannot serve two accounts (account id + SSO name hash both differ)
      deployment_account_id: { type: string, required: false, default: '' }   # non-empty on exactly ONE account (single-owner gate, deployment-ecr.tf): that apply owns the shared-registry resources
      cluster_pull_account_ids: { type: string, required: false, default: '[]' } # JSON array of cluster account ids granted read-only pull on the shared registry

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "1"

jobs:
  setup:
    name: setup-matrix
    runs-on: ubuntu-latest
    outputs:
      enabled_regions: ${{ inputs.regions_json }}
    steps:
      - run: |
          echo "regions=${{ inputs.regions_json }} account=${{ inputs.account_id }} ref=${{ inputs.ref }} environment=${{ inputs.environment }}"
          if [ "${{ inputs.bootstrap_complete }}" != "true" ]; then
            echo "::warning::bootstrap_complete=false for account ${{ inputs.account_id }} in accounts.json — SKIPPING all apply jobs (state bucket / CI roles not bootstrapped yet). Bootstrap the account, then flip bootstrap_complete=true."
          fi

  # EKS version cost gate (A12 single-source). Plans the platform region against the
  # in-module `check` block and reads its status from `terraform show -json`. gate=true
  # (aged-out, or any error → fail-safe) HARD-FAILS this workflow for prod
  # (gate_blocks=true) BEFORE any apply — extended-support never reaches prod, not even
  # behind an approval. For staging (gate_blocks=false) it is warn-only.
  version-gate:
    name: eks-version-cost-gate
    needs: setup
    runs-on: ubuntu-latest
    # Per-account bootstrap flag from HEAD accounts.json (passed by the caller),
    # NOT the repo-level BOOTSTRAP_COMPLETE var (that one stays only on the
    # legacy break-glass infra-apply.yml).
    if: ${{ inputs.bootstrap_complete }}
    outputs:
      gate: ${{ steps.check.outputs.gate }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: arn:aws:iam::${{ inputs.account_id }}:role/gh-tf-apply-platform
          aws-region: ${{ env.AWS_REGION }}
      - id: check
        env:
          TF_VAR_environment:            ${{ inputs.environment }}  # workload overlay selector (accounts-dimension ADR)
          TF_VAR_tfstate_bucket:         aegis-platform-aws-tfstate-${{ inputs.account_id }}
          TF_VAR_tfstate_region:         ${{ secrets.TFSTATE_REGION }}
          TF_VAR_github_token:           ${{ secrets.GH_DEPLOY_KEY_PAT }}
          TF_VAR_operator_principal_arn: ${{ inputs.operator_principal_arn }}
          OVERRIDES_JSON:                ${{ inputs.overrides_json }}
        run: |
          set -uo pipefail
          BKT="aegis-platform-aws-tfstate-${{ inputs.account_id }}"
          r="$(jq -r '.platform_region' regions.auto.tfvars.json)"
          export TF_VAR_region="$r" TF_VAR_platform_region="$r"
          # effective scalars = base regions[r] * overrides (override wins)
          eff="$(jq -c --arg r "$r" --argjson ov "$OVERRIDES_JSON" '.regions[$r] * $ov' regions.auto.tfvars.json)"
          TF_VAR_node_instance="$(echo "$eff" | jq -r '.node_instance')"
          TF_VAR_node_min="$(echo "$eff" | jq -r '.node_min')"
          TF_VAR_node_max="$(echo "$eff" | jq -r '.node_max')"
          export TF_VAR_node_instance TF_VAR_node_min TF_VAR_node_max
          printf '%s' '${{ vars.REGISTRIES_JSON }}' > "$GITHUB_WORKSPACE/registries.auto.tfvars.json"
          gate=true # fail-safe default
          plan_ok=false
          cd terraform/envs/regional
          if terraform init -reconfigure \
               -backend-config="bucket=${BKT}" \
               -backend-config="region=${{ secrets.TFSTATE_REGION }}" \
               -backend-config="key=regional/${r}/terraform.tfstate" \
               -backend-config="encrypt=true" \
             && terraform plan -lock=false -out=tfplan -var-file="$GITHUB_WORKSPACE/registries.auto.tfvars.json" \
             && terraform show -json tfplan > /tmp/plan.json; then
            plan_ok=true
            status=$(jq -r '[.checks[]? | select(.address.name=="eks_version_in_standard_support") | .status] | (.[0] // "unknown")' /tmp/plan.json)
            echo "terraform check status: ${status}"
            [ "${status}" = "pass" ] && gate=false
          else
            echo "::warning::version-gate plan failed — defaulting gate=true (fail-safe)"
          fi
          echo "gate=${gate}" >> "$GITHUB_OUTPUT"
          if [ "${gate}" = "true" ]; then
            if [ "${{ inputs.gate_blocks }}" = "true" ]; then
              # Distinguish plan failure (infra/lock/provider issue) from a genuine
              # version age-out so the operator targets the right fix immediately.
              # Gating semantics are unchanged: HARD-FAIL in both cases (fail-safe).
              if [ "${plan_ok}" = "false" ]; then
                echo "::error::version-gate PLAN failed (not a version issue) — investigate the plan error above. HARD-FAIL (prod)."
              else
                echo "::error::EKS version aged out — bump var.cluster_version, re-verify on staging, then re-promote. HARD-FAIL (prod)."
              fi
              exit 1
            else
              if [ "${plan_ok}" = "false" ]; then
                echo "::warning::version-gate plan failed on staging — defaulting gate=true (fail-safe). Investigate the plan error above; apply proceeds (staging warn-only)."
              else
                echo "::warning::EKS version aged out on staging — warn-only, apply proceeds. Bump var.cluster_version."
              fi
            fi
          fi

  apply-platform:
    name: apply-platform
    needs: version-gate
    runs-on: ubuntu-latest
    if: ${{ inputs.bootstrap_complete }}
    timeout-minutes: 90
    # Serialize per account: a second run (or an infra-ops destroy-platform on the
    # same account) queues instead of racing this apply on the same state.
    concurrency:
      group: infra-${{ inputs.account_id }}-platform
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: arn:aws:iam::${{ inputs.account_id }}:role/gh-tf-apply-platform
          aws-region: ${{ env.AWS_REGION }}
      - name: apply
        env:
          # Per-env selector (WS3-R): envs/platform's `environment` var has no
          # default (high-impact zone/Cognito naming selector), so the apply must
          # pass it — same as version-gate (regional) and apply-regional do.
          TF_VAR_environment:              ${{ inputs.environment }}
          # ADR-10 shared registry (deployment-ecr.tf): empty id = gated off.
          TF_VAR_deployment_account_id:    ${{ inputs.deployment_account_id }}
          TF_VAR_cluster_pull_account_ids: ${{ inputs.cluster_pull_account_ids }}
          TF_VAR_grafana_cloud_api_token:             ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
          TF_VAR_grafana_auth_token:                  ${{ secrets.GRAFANA_AUTH_TOKEN }}
          TF_VAR_grafana_cloud_mimir_username:        ${{ secrets.GRAFANA_CLOUD_MIMIR_USERNAME }}
          TF_VAR_grafana_cloud_loki_username:         ${{ secrets.GRAFANA_CLOUD_LOKI_USERNAME }}
          TF_VAR_grafana_cloud_tempo_username:        ${{ secrets.GRAFANA_CLOUD_TEMPO_USERNAME }}
          TF_VAR_grafana_cloud_pyroscope_username:    ${{ secrets.GRAFANA_CLOUD_PYROSCOPE_USERNAME }}
          TF_VAR_grafana_cloud_mimir_url:             ${{ secrets.GRAFANA_CLOUD_MIMIR_URL }}
          TF_VAR_grafana_cloud_loki_url:              ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          TF_VAR_grafana_cloud_tempo_url:             ${{ secrets.GRAFANA_CLOUD_TEMPO_URL }}
          TF_VAR_grafana_cloud_pyroscope_url:         ${{ secrets.GRAFANA_CLOUD_PYROSCOPE_URL }}
          TF_VAR_budget_alert_email:                  ${{ secrets.BUDGET_ALERT_EMAIL }}
          TF_VAR_github_token:                        ${{ secrets.GH_DEPLOY_KEY_PAT }}
          TF_VAR_enable_cloudwatch_datasource:        ${{ vars.ENABLE_CLOUDWATCH_DATASOURCE || 'false' }}
          TF_VAR_grafana_cloud_aws_account_id:        ${{ secrets.GRAFANA_CLOUD_AWS_ACCOUNT_ID }}
          TF_VAR_grafana_cloud_external_id:           ${{ secrets.GRAFANA_CLOUD_EXTERNAL_ID }}
        run: |
          BKT="aegis-platform-aws-tfstate-${{ inputs.account_id }}"
          cd terraform/envs/platform
          terraform init -reconfigure \
            -backend-config="bucket=${BKT}" \
            -backend-config="region=${{ secrets.TFSTATE_REGION }}" \
            -backend-config="encrypt=true"
          # Guarded auto-unlock (S3 native lock). This job serializes per account via
          # its concurrency group (infra-<account>-platform), so any <key>.tflock here
          # is orphaned by a dead predecessor run (cancelled / OOM / timeout), never a
          # live peer — clear it so an interrupted run self-heals instead of wedging the
          # next on a stale lock. (2026-06-18: a cancelled destroy left a state-rm lock
          # that failed the next run.)
          LOCK="s3://${BKT}/platform/terraform.tfstate.tflock"
          if aws s3 ls "$LOCK" >/dev/null 2>&1; then
            echo "::warning::clearing orphaned terraform lock ${LOCK}"
            aws s3 rm "$LOCK"
          fi
          terraform apply -auto-approve -var-file="$GITHUB_WORKSPACE/regions.auto.tfvars.json"

  apply-regional:
    name: "apply-regional (${{ matrix.region }})"
    needs: [setup, apply-platform, version-gate]
    runs-on: ubuntu-latest
    if: ${{ inputs.bootstrap_complete && needs.setup.outputs.enabled_regions != '[]' }}
    # Prod (gate_blocks=true) ALWAYS runs in the required-reviewer `prod-apply-gated`
    # environment — merging a promotion PR never applies prod without a human approval.
    # (An aged-out EKS version never even reaches here: version-gate hard-fails first.)
    # Staging (gate_blocks=false): always the ungated `staging` environment, gate warn-only.
    environment: ${{ inputs.gate_blocks && 'prod-apply-gated' || 'staging' }}
    timeout-minutes: 90
    # Serialize per account+region: a second apply (or an infra-ops destroy-region
    # on the same account+region) queues instead of racing this run on the same state.
    concurrency:
      group: infra-${{ inputs.account_id }}-${{ matrix.region }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJson(needs.setup.outputs.enabled_regions) }}
    # Secret/static TF vars at job level so apply AND self-reap destroy see the
    # same variable set; region-derived scalars land in GITHUB_ENV (step below).
    env:
      TF_VAR_environment:     ${{ inputs.environment }}  # workload overlay selector (accounts-dimension ADR)
      TF_VAR_tfstate_bucket:  aegis-platform-aws-tfstate-${{ inputs.account_id }}
      TF_VAR_tfstate_region:  ${{ secrets.TFSTATE_REGION }}
      TF_VAR_github_token:    ${{ secrets.GH_DEPLOY_KEY_PAT }}
      TF_VAR_operator_principal_arn: ${{ inputs.operator_principal_arn }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: arn:aws:iam::${{ inputs.account_id }}:role/gh-tf-apply-platform
          aws-region: ${{ matrix.region }}
      - name: effective per-region scalars (base * overrides) -> GITHUB_ENV
        env:
          OVERRIDES_JSON: ${{ inputs.overrides_json }}
        run: |
          r='${{ matrix.region }}'
          eff="$(jq -c --arg r "$r" --argjson ov "$OVERRIDES_JSON" '.regions[$r] * $ov' regions.auto.tfvars.json)"
          {
            echo "TF_VAR_region=$r"
            echo "TF_VAR_node_instance=$(echo "$eff" | jq -r '.node_instance')"
            echo "TF_VAR_node_min=$(echo "$eff" | jq -r '.node_min')"
            echo "TF_VAR_node_max=$(echo "$eff" | jq -r '.node_max')"
            echo "TF_VAR_platform_region=$(jq -r '.platform_region' regions.auto.tfvars.json)"
          } >> "$GITHUB_ENV"
      - name: init
        run: |
          BKT="aegis-platform-aws-tfstate-${{ inputs.account_id }}"
          printf '%s' '${{ vars.REGISTRIES_JSON }}' > "$GITHUB_WORKSPACE/registries.auto.tfvars.json"
          cd terraform/envs/regional
          terraform init -reconfigure \
            -backend-config="bucket=${BKT}" \
            -backend-config="region=${{ secrets.TFSTATE_REGION }}" \
            -backend-config="key=regional/${{ matrix.region }}/terraform.tfstate" \
            -backend-config="encrypt=true"
      - name: apply
        id: apply
        working-directory: terraform/envs/regional
        run: |
          # Guarded auto-unlock (S3 native lock). This job serializes per account+region
          # via its concurrency group (infra-<account>-<region>), so any <key>.tflock
          # here is orphaned by a dead predecessor run (cancelled / OOM / timeout), never
          # a live peer — clear it so an interrupted run self-heals instead of wedging
          # the next on a stale lock. (2026-06-18: a cancelled destroy left a state-rm
          # lock that failed the next run.) Placed before apply_started=true so a lock
          # clear is not treated as an apply that started.
          BKT="aegis-platform-aws-tfstate-${{ inputs.account_id }}"
          KEY="regional/${{ matrix.region }}/terraform.tfstate"
          LOCK="s3://${BKT}/${KEY}.tflock"
          if aws s3 ls "$LOCK" >/dev/null 2>&1; then
            echo "::warning::clearing orphaned terraform lock ${LOCK}"
            aws s3 rm "$LOCK"
          fi
          # A6 blast-radius bound: flag that terraform apply is ABOUT to mutate the
          # account. Self-reap below fires only when this flag is set, so a pre-apply
          # failure (checkout / init / state lock / provider download) never destroys
          # a healthy stack.
          echo "apply_started=true" >> "$GITHUB_OUTPUT"
          terraform apply -auto-approve -var-file="$GITHUB_WORKSPACE/registries.auto.tfvars.json"
      - name: self-reap partial stack (A6)
        # Only after a FAILED apply that actually started (a failed apply can leave
        # billable resources).
        #
        # READ THE FLAG CAREFULLY — the semantics are INVERTED from intuition:
        #   ALLOW_PARTIAL_APPLY = 'true'  -> reap is OFF: KEEP the partial stack
        #                                    (for debugging / a live in-place fix).
        #   ALLOW_PARTIAL_APPLY != 'true' (false / unset) -> reap is ON: this step
        #                                    runs and DESTROYS the partial stack.
        # So "false" does NOT mean "do not reap" — false is the value that ENABLES
        # the destroy. To keep a failed stack alive for a live fix, set it TRUE
        # BEFORE the run. (2026-06-18 prod dual-region: the run was on false, a
        # failed apply-regional auto-reaped, and only a fast `gh run cancel` saved
        # the two live EKS clusters.)
        if: ${{ failure() && steps.apply.outputs.apply_started == 'true' && vars.ALLOW_PARTIAL_APPLY != 'true' }}
        working-directory: terraform/envs/regional
        # Surface workflow expressions through env, not direct ${{ }} interpolation
        # into the shell, so an unexpected value can never break out of the string
        # (GitHub script-injection hardening; account_id/region are operator topology
        # but the pattern stays safe regardless).
        env:
          ACCOUNT_ID: ${{ inputs.account_id }}
          REGION:     ${{ matrix.region }}
        run: |
          echo "::error::apply failed for ${REGION} (account ${ACCOUNT_ID})"
          echo "::warning::self-reaping the partial stack (set ALLOW_PARTIAL_APPLY=true to keep it)"
          # Ephemeral-cluster teardown — the SAME root-fix as infra-ops
          # destroy-region (2026-06-11): a plain `terraform destroy` here deadlocks
          # on kyverno's fail-closed webhooks/finalizers, leaving the cluster
          # HALF-destroyed (NAT/route gone, EKS+nodes still billing) — caught live
          # 2026-06-11. Delete the cluster, don't graceful-uninstall: state-rm every
          # helm_release/kubernetes_ so destroy never attempts the deadlock-prone
          # uninstall (the cluster deletion reaps them). kubectl + pre-destroy.sh
          # clean any ALB first (ENIs that would DependencyViolation the VPC).
          r="$REGION"
          # Derive the cluster name from the already-initialised terraform state
          # (the init step above ran in this same working-directory). Fall back to
          # the canonical convention so the script stays runnable when state is partial.
          CLUSTER="$(terraform output -raw cluster_name 2>/dev/null || echo "aegis-platform-${r}")"
          curl -sSL -o /usr/local/bin/kubectl "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" && chmod +x /usr/local/bin/kubectl || echo "::warning::kubectl install failed — in-cluster pre-destroy skipped"
          bash "$GITHUB_WORKSPACE/scripts/dr/pre-destroy.sh" "$r" "$CLUSTER" || echo "::warning::pre-destroy (graceful ALB cleanup) did not complete"
          VPC="$(aws eks describe-cluster --name "$CLUSTER" --region "$r" --query 'cluster.resourcesVpcConfig.vpcId' --output text 2>/dev/null || echo '')"
          if [ -n "$VPC" ] && [ "$VPC" != "None" ]; then
            for arn in $(aws elbv2 describe-load-balancers --region "$r" --query "LoadBalancers[?VpcId=='${VPC}'].LoadBalancerArn" --output text 2>/dev/null); do
              echo "self-reap backstop: deleting orphaned ALB ${arn}"
              aws elbv2 delete-load-balancer --load-balancer-arn "$arn" --region "$r" 2>/dev/null || true
            done
            deadline=$(( $(date +%s) + 300 ))
            while [ -n "$(aws elbv2 describe-load-balancers --region "$r" --query "LoadBalancers[?VpcId=='${VPC}'].LoadBalancerArn" --output text 2>/dev/null)" ]; do
              [ "$(date +%s)" -ge "$deadline" ] && { echo "::warning::ELBv2 still present after 5 min"; break; }
              sleep 15
            done
            sleep 20
            # The controller-owned backend SG (k8s-traffic-<cluster>-*, tag
            # elbv2.k8s.aws/cluster) is NOT swept here: a one-shot pre-destroy sweep
            # runs too early (the SG is still attached to node ENIs). It is reaped by
            # the background loop that runs CONCURRENTLY with `terraform destroy` below,
            # behind the enableBackendSecurityGroup=false source fix in
            # modules/regional-stack/alb-controller.tf (2026-06-17).
          fi
          terraform state list 2>/dev/null | grep -E 'helm_release\.|kubernetes_' | while read -r addr; do
            echo "self-reap: state rm ${addr} (cluster deletion reaps it)"
            terraform state rm "$addr" || true
          done
          # A (2026-06-17 root-fix): reap controller-orphaned SGs CONCURRENTLY with
          # terraform destroy (terraform's aws_vpc delete retries DependencyViolation
          # internally and does not give up; the k8s-traffic-* SG only frees once node
          # ENIs detach DURING this destroy). Reaper runs in the background; destroy
          # stays foreground.
          reap_orphan_sgs() {
            while sleep 20; do
              for sg in $(aws ec2 describe-security-groups --region "$r" \
                --filters "Name=tag:elbv2.k8s.aws/cluster,Values=${CLUSTER}" \
                --query 'SecurityGroups[].GroupId' --output text 2>/dev/null); do
                ing="$(aws ec2 describe-security-groups --region "$r" --group-ids "$sg" --query 'SecurityGroups[0].IpPermissions' --output json 2>/dev/null || echo '[]')"
                [ "$ing" != "[]" ] && aws ec2 revoke-security-group-ingress --region "$r" --group-id "$sg" --ip-permissions "$ing" >/dev/null 2>&1 || true
                aws ec2 delete-security-group --region "$r" --group-id "$sg" 2>/dev/null \
                  && echo "bg-reaper: deleted orphaned controller SG ${sg}" || true
              done
            done
          }
          reap_orphan_sgs & REAPER_PID=$!
          DESTROY_RC=0
          terraform destroy -auto-approve -var-file="$GITHUB_WORKSPACE/registries.auto.tfvars.json" || DESTROY_RC=$?
          kill "$REAPER_PID" 2>/dev/null || true; wait "$REAPER_PID" 2>/dev/null || true
          # NEVER mask the destroy exit ("|| echo" made a failed reap report a green
          # step while the cluster kept billing — caught live 2026-06-10). LOUD failure.
          if [ "$DESTROY_RC" -ne 0 ]; then
            echo "::error::self-reap destroy ALSO failed — resources may STILL BE BILLING. Dispatch infra-ops destroy-region (account ${ACCOUNT_ID}, ${REGION}) NOW; ttl-reaper + budget are only the backstops."
            exit 1
          fi
      - name: partial stack kept (ALLOW_PARTIAL_APPLY)
        if: ${{ failure() && steps.apply.outputs.apply_started == 'true' && vars.ALLOW_PARTIAL_APPLY == 'true' }}
        env:
          ACCOUNT_ID: ${{ inputs.account_id }}
          REGION:     ${{ matrix.region }}
        run: |
          echo "::error::apply failed for ${REGION} (account ${ACCOUNT_ID})"
          echo "::warning::ALLOW_PARTIAL_APPLY=true — leaving the partial stack (it may be billing)."
