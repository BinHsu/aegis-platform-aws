name: infra-apply

# A13 (incident 2026-06-06): ON-DEMAND only — NOT auto-apply-on-merge.
# This previously ran on every push to main touching terraform/**, so a merge
# was a real PROD deploy (an auto-apply on merge is what stood the incident
# cluster up — the workload/greeter is staging-first via ADR-10 promotion, but
# the *infra* layer was not gated). It is now workflow_dispatch only: the
# operator deliberately triggers a prod apply inside a deploy window. PR-time
# validation still runs via infra-plan; the version-gate + prod-apply-gated
# environment still gate the dispatched apply.
#
# Dispatch from main (gh-tf-apply-platform OIDC trust = refs/heads/main plus
# the main-branch-only apply environments — see envs/platform/oidc.tf).
# Bootstrap is NOT in this path — it's one-shot via infra-ops.yml.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "apply" to confirm a real PROD infrastructure apply
        required: true
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

# Never two applies racing the same state; never cancel a terraform apply
# mid-flight (a killed apply leaves partial billable resources + a locked
# state). A second dispatch queues behind the running one.
concurrency:
  group: infra-apply
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "1"

jobs:
  setup:
    name: setup-matrix
    runs-on: ubuntu-latest
    outputs:
      enabled_regions: ${{ steps.regions.outputs.list }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: confirm intent
        run: |
          if [ "${{ inputs.confirm }}" != "apply" ]; then
            echo "::error::This dispatches a REAL prod infrastructure apply. Type 'apply' in the confirm input to proceed."
            exit 1
          fi
      - id: regions
        run: |
          list=$(jq -c '[.regions | to_entries[] | select(.value.enabled) | .key]' regions.auto.tfvars.json)
          echo "list=${list}" >> "$GITHUB_OUTPUT"

  # EKS version cost gate (incident 2026-06-06). Checks the pinned cluster
  # version against its end-of-standard-support date. If it has aged out,
  # gate=true and apply-regional routes through a required-approval environment
  # — a human must approve before a cluster bills at the +$0.50/hr
  # extended-support rate.
  #
  # A12 single-source: the detector is the in-module terraform `check` block
  # (regional-stack/eks-version-guard.tf). This job runs a `terraform plan` for
  # the platform region (cluster_version is module-wide, so one plan suffices)
  # and reads that check's status from `terraform show -json` `.checks[]` — so
  # version-age logic lives in ONE place, not duplicated in CI. Fail-safe: any
  # error → gate=true (require approval rather than silently skip).
  version-gate:
    name: eks-version-cost-gate
    needs: setup
    runs-on: ubuntu-latest
    if: ${{ vars.BOOTSTRAP_COMPLETE == 'true' }}
    outputs:
      gate: ${{ steps.check.outputs.gate }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - id: check
        env:
          TF_VAR_tfstate_bucket:         ${{ secrets.TFSTATE_BUCKET }}
          TF_VAR_tfstate_region:         ${{ secrets.TFSTATE_REGION }}
          TF_VAR_github_token:           ${{ secrets.GH_DEPLOY_KEY_PAT }}
          TF_VAR_operator_principal_arn: ${{ secrets.OPERATOR_PRINCIPAL_ARN }}
        run: |
          set -uo pipefail
          r="$(jq -r '.platform_region' regions.auto.tfvars.json)"
          export TF_VAR_region="$r" TF_VAR_platform_region="$r"
          eval "$(jq -r --arg r "$r" '.regions[$r] | "export TF_VAR_node_instance=\(.node_instance) TF_VAR_node_min=\(.node_min) TF_VAR_node_max=\(.node_max)"' regions.auto.tfvars.json)"
          printf '%s' '${{ vars.REGISTRIES_JSON }}' > "$GITHUB_WORKSPACE/registries.auto.tfvars.json"
          gate=true # fail-safe default
          cd terraform/envs/regional
          if terraform init -reconfigure \
               -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
               -backend-config="region=${{ secrets.TFSTATE_REGION }}" \
               -backend-config="key=regional/${r}/terraform.tfstate" \
               -backend-config="encrypt=true" \
             && terraform plan -out=tfplan -var-file="$GITHUB_WORKSPACE/registries.auto.tfvars.json" \
             && terraform show -json tfplan > /tmp/plan.json; then
            status=$(jq -r '[.checks[]? | select(.address.name=="eks_version_in_standard_support") | .status] | (.[0] // "unknown")' /tmp/plan.json)
            echo "terraform check status: ${status}"
            [ "${status}" = "pass" ] && gate=false
          else
            echo "::warning::version-gate plan failed — defaulting gate=true (fail-safe)"
          fi
          echo "gate=${gate}" >> "$GITHUB_OUTPUT"
          [ "${gate}" = "true" ] && echo "::warning::EKS version check did not pass; apply-regional needs manual approval. Bump var.cluster_version."

  apply-platform:
    name: apply-platform
    runs-on: ubuntu-latest
    # Hard ceiling on a hung apply (e.g. a helm_release that never converges)
    # — a runaway terraform process otherwise holds the state lock and burns
    # runner minutes for 6h (the GitHub default).
    timeout-minutes: 90
    # Skips until the operator has run bootstrap + platform locally and
    # set the BOOTSTRAP_COMPLETE repo variable (the IAM apply role +
    # GitHub OIDC provider must exist first). Keeps the pipeline green
    # through the bootstrap-ordering gap.
    if: ${{ vars.BOOTSTRAP_COMPLETE == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: apply
        env:
          TF_VAR_grafana_cloud_api_token:             ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
          TF_VAR_grafana_auth_token:                  ${{ secrets.GRAFANA_AUTH_TOKEN }}
          TF_VAR_grafana_cloud_mimir_username:     ${{ secrets.GRAFANA_CLOUD_MIMIR_USERNAME }}
          TF_VAR_grafana_cloud_loki_username:      ${{ secrets.GRAFANA_CLOUD_LOKI_USERNAME }}
          TF_VAR_grafana_cloud_tempo_username:     ${{ secrets.GRAFANA_CLOUD_TEMPO_USERNAME }}
          TF_VAR_grafana_cloud_pyroscope_username: ${{ secrets.GRAFANA_CLOUD_PYROSCOPE_USERNAME }}
          TF_VAR_grafana_cloud_mimir_url:             ${{ secrets.GRAFANA_CLOUD_MIMIR_URL }}
          TF_VAR_grafana_cloud_loki_url:              ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          TF_VAR_grafana_cloud_tempo_url:             ${{ secrets.GRAFANA_CLOUD_TEMPO_URL }}
          TF_VAR_grafana_cloud_pyroscope_url:         ${{ secrets.GRAFANA_CLOUD_PYROSCOPE_URL }}
          TF_VAR_budget_alert_email:                  ${{ secrets.BUDGET_ALERT_EMAIL }}
          TF_VAR_github_token:                        ${{ secrets.GH_DEPLOY_KEY_PAT }}
          TF_VAR_enable_cloudwatch_datasource:        ${{ vars.ENABLE_CLOUDWATCH_DATASOURCE || 'false' }}
          TF_VAR_grafana_cloud_aws_account_id:        ${{ secrets.GRAFANA_CLOUD_AWS_ACCOUNT_ID }}
          TF_VAR_grafana_cloud_external_id:           ${{ secrets.GRAFANA_CLOUD_EXTERNAL_ID }}
        run: |
          cd terraform/envs/platform
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
            -backend-config="region=${{ secrets.TFSTATE_REGION }}" \
            -backend-config="encrypt=true"
          terraform apply -auto-approve -var-file="$GITHUB_WORKSPACE/regions.auto.tfvars.json"

  apply-regional:
    name: "apply-regional (${{ matrix.region }})"
    runs-on: ubuntu-latest
    needs: [setup, apply-platform, version-gate]
    # See apply-platform — gated on the operator-set BOOTSTRAP_COMPLETE.
    if: ${{ vars.BOOTSTRAP_COMPLETE == 'true' && needs.setup.outputs.enabled_regions != '[]' }}
    # Whole-wave single approval: if the EKS version cost gate tripped, every
    # region's apply routes through the required-reviewer environment
    # `prod-apply-gated` (one approval releases the wave). Otherwise the
    # ungated `prod-apply` environment lets a clean apply proceed unattended.
    # Both environments must exist in repo Settings → Environments; only
    # `prod-apply-gated` carries required reviewers. (Required reviewers are
    # free on public repos; private repos need Team/Enterprise.)
    environment: ${{ needs.version-gate.outputs.gate == 'true' && 'prod-apply-gated' || 'prod-apply' }}
    # Apply + (on failure) self-reap destroy ceiling. The prod-apply-gated
    # approval wait does NOT count toward this — the job has not started
    # while it waits for the environment's required reviewer.
    timeout-minutes: 90
    strategy:
      fail-fast: false       # one region's failure doesn't abort others
      matrix:
        region: ${{ fromJson(needs.setup.outputs.enabled_regions) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_APPLY_ROLE_ARN }}
          aws-region: ${{ matrix.region }}
      - name: extract per-region scalars
        id: scalars
        run: |
          r='${{ matrix.region }}'
          jq -r --arg r "$r" '.regions[$r] | "node_instance=\(.node_instance)\nnode_min=\(.node_min)\nnode_max=\(.node_max)"' \
            regions.auto.tfvars.json >> "$GITHUB_OUTPUT"
      - name: extract platform_region (single SoT)
        id: pr
        run: |
          echo "platform_region=$(jq -r '.platform_region' regions.auto.tfvars.json)" >> "$GITHUB_OUTPUT"
      - name: apply
        env:
          TF_VAR_region:          ${{ matrix.region }}
          TF_VAR_node_instance:   ${{ steps.scalars.outputs.node_instance }}
          TF_VAR_node_min:        ${{ steps.scalars.outputs.node_min }}
          TF_VAR_node_max:        ${{ steps.scalars.outputs.node_max }}
          TF_VAR_platform_region: ${{ steps.pr.outputs.platform_region }}
          TF_VAR_tfstate_bucket:  ${{ secrets.TFSTATE_BUCKET }}
          TF_VAR_tfstate_region:  ${{ secrets.TFSTATE_REGION }}
          TF_VAR_github_token:    ${{ secrets.GH_DEPLOY_KEY_PAT }}
          TF_VAR_operator_principal_arn: ${{ secrets.OPERATOR_PRINCIPAL_ARN }}
        run: |
          # registries.auto.tfvars.json is gitignored (per-workload ECR account
          # IDs) so it is not in the checkout — materialise it from the
          # REGISTRIES_JSON repo variable for CI.
          printf '%s' '${{ vars.REGISTRIES_JSON }}' > "$GITHUB_WORKSPACE/registries.auto.tfvars.json"
          cd terraform/envs/regional
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
            -backend-config="region=${{ secrets.TFSTATE_REGION }}" \
            -backend-config="key=regional/${{ matrix.region }}/terraform.tfstate" \
            -backend-config="encrypt=true"
          # A6: self-reap on failed apply. A failed apply can leave billable
          # resources (the incident: EKS created, apply then failed on kyverno).
          # Destroy the partial stack unless ALLOW_PARTIAL_APPLY=true (keep it for
          # debugging). Re-raise the failure either way. The kyverno teardown
          # deadlock that this would have hit is fixed by A4 (wait=false +
          # pre-destroy webhook cleanup).
          if ! terraform apply -auto-approve -var-file="$GITHUB_WORKSPACE/registries.auto.tfvars.json"; then
            echo "::error::apply failed for ${{ matrix.region }}"
            if [ "${{ vars.ALLOW_PARTIAL_APPLY }}" = "true" ]; then
              echo "::warning::ALLOW_PARTIAL_APPLY=true — leaving the partial stack for debugging (it may be billing)."
            else
              echo "::warning::self-reaping the partial stack (set ALLOW_PARTIAL_APPLY=true to keep it)"
              terraform destroy -auto-approve -var-file="$GITHUB_WORKSPACE/registries.auto.tfvars.json" \
                || echo "::error::self-reap destroy ALSO failed — resources may still be billing; ttl-reaper + budget are the backstops."
            fi
            exit 1
          fi
