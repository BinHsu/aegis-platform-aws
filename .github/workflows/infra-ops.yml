name: infra-ops

# Workflow-dispatch only — operator-triggered one-shots and DR drill.
#
# Available operations:
#   - bootstrap         : create S3 bucket + DynamoDB lock table (one-time)
#   - destroy-region    : destroy a single region's regional stack (DR drill)
#   - destroy-platform  : destroy platform env (post-submission cleanup)
#
# Bootstrap uses LOCAL state, applied in CI's ephemeral runner — operator
# uploads the resulting state to a one-off artifact + manually configures
# the GH Actions secrets TFSTATE_BUCKET / TFSTATE_REGION afterwards.
# (For take-home, applying bootstrap from operator's laptop is also fine
# and arguably safer — see backlog Step 6 + Open Questions.)

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Operation to run
        required: true
        type: choice
        options:
          - bootstrap
          - destroy-region
          - destroy-platform
      region:
        description: Region (required for destroy-region)
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read
  issues: write # A6: open an alert issue if a teardown fails (still billing)

# Serialise per region — two destroys racing one regional state corrupt it;
# never cancel a terraform run mid-flight (a killed destroy strands partial
# billable resources). Region is empty for bootstrap/destroy-platform, which
# collapses those onto one shared group — also correct (one platform state).
concurrency:
  group: infra-ops-${{ inputs.region }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "1"

jobs:
  # Bootstrap only — apply role, not gated (creates the state backend).
  ops:
    if: ${{ inputs.operation == 'bootstrap' }}
    runs-on: ubuntu-latest
    # Ceiling on a hung terraform apply (GitHub default is 6h).
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: bootstrap
        run: |
          cd terraform/envs/bootstrap
          terraform init && terraform apply -auto-approve -var-file="$GITHUB_WORKSPACE/regions.auto.tfvars.json"
          terraform output -raw backend_hcl
          echo ""
          echo "::warning::Capture the bucket_name + region above and set them as GH Actions secrets TFSTATE_BUCKET + TFSTATE_REGION."

  # Teardown — HUMAN-GATED (A7, incident 2026-06-06). The `destroy` environment
  # has a required reviewer (the operator); this job pauses for approval before
  # assuming the destroy role, so ANY branch can dispatch a teardown but prod is
  # never deleted without an explicit human approval. Uses gh-tf-destroy-platform
  # (OIDC trust = environment:destroy), NOT the main-only apply role — that is
  # what unblocks feature-branch teardowns (the incident's failed attempt #2).
  destroy:
    if: ${{ inputs.operation == 'destroy-region' || inputs.operation == 'destroy-platform' }}
    runs-on: ubuntu-latest
    environment: destroy
    # Ceiling on a hung terraform destroy (the kyverno-deadlock shape). The
    # `destroy` environment's approval wait does NOT count toward this — the
    # job has not started while it waits for the required reviewer.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DESTROY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: destroy-region
        if: ${{ inputs.operation == 'destroy-region' }}
        env:
          TF_VAR_region:         ${{ inputs.region }}
          TF_VAR_tfstate_bucket: ${{ secrets.TFSTATE_BUCKET }}
          TF_VAR_tfstate_region: ${{ secrets.TFSTATE_REGION }}
          TF_VAR_github_token:   ${{ secrets.GH_DEPLOY_KEY_PAT }}
          TF_VAR_operator_principal_arn: ${{ secrets.OPERATOR_PRINCIPAL_ARN }}
        run: |
          if [[ -z "${{ inputs.region }}" ]]; then
            echo "::error::region input is required for destroy-region"
            exit 1
          fi
          r='${{ inputs.region }}'
          # Per-region scalars + platform_region — all from the single
          # SoT, regions.auto.tfvars.json.
          TF_VAR_platform_region="$(jq -r '.platform_region' regions.auto.tfvars.json)"
          export TF_VAR_platform_region
          eval "$(jq -r --arg r "$r" '.regions[$r] | "TF_VAR_vpc_cidr=\(.cidr); TF_VAR_node_instance=\(.node_instance); TF_VAR_node_min=\(.node_min); TF_VAR_node_max=\(.node_max)"' regions.auto.tfvars.json)"
          export TF_VAR_vpc_cidr TF_VAR_node_instance TF_VAR_node_min TF_VAR_node_max
          # registries.auto.tfvars.json is gitignored — materialise it from the
          # REGISTRIES_JSON repo variable (same as infra-apply / infra-plan).
          printf '%s' '${{ vars.REGISTRIES_JSON }}' > "$GITHUB_WORKSPACE/registries.auto.tfvars.json"
          cd terraform/envs/regional
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
            -backend-config="region=${{ secrets.TFSTATE_REGION }}" \
            -backend-config="key=regional/$r/terraform.tfstate" \
            -backend-config="encrypt=true"
          terraform destroy -auto-approve -var-file="$GITHUB_WORKSPACE/registries.auto.tfvars.json"

      - name: destroy-platform
        if: ${{ inputs.operation == 'destroy-platform' }}
        env:
          TF_VAR_grafana_cloud_api_token:             ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
          TF_VAR_grafana_auth_token:                  ${{ secrets.GRAFANA_AUTH_TOKEN }}
          TF_VAR_grafana_cloud_mimir_username:     ${{ secrets.GRAFANA_CLOUD_MIMIR_USERNAME }}
          TF_VAR_grafana_cloud_loki_username:      ${{ secrets.GRAFANA_CLOUD_LOKI_USERNAME }}
          TF_VAR_grafana_cloud_tempo_username:     ${{ secrets.GRAFANA_CLOUD_TEMPO_USERNAME }}
          TF_VAR_grafana_cloud_pyroscope_username: ${{ secrets.GRAFANA_CLOUD_PYROSCOPE_USERNAME }}
          TF_VAR_grafana_cloud_mimir_url:             ${{ secrets.GRAFANA_CLOUD_MIMIR_URL }}
          TF_VAR_grafana_cloud_loki_url:              ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          TF_VAR_grafana_cloud_tempo_url:             ${{ secrets.GRAFANA_CLOUD_TEMPO_URL }}
          TF_VAR_grafana_cloud_pyroscope_url:         ${{ secrets.GRAFANA_CLOUD_PYROSCOPE_URL }}
          TF_VAR_budget_alert_email:                  ${{ secrets.BUDGET_ALERT_EMAIL }}
          TF_VAR_github_token:                        ${{ secrets.GH_DEPLOY_KEY_PAT }}
        run: |
          cd terraform/envs/platform
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
            -backend-config="region=${{ secrets.TFSTATE_REGION }}" \
            -backend-config="encrypt=true"
          terraform destroy -auto-approve -var-file="$GITHUB_WORKSPACE/regions.auto.tfvars.json"

      # A6: a FAILED destroy means resources may still be billing — escalate
      # loudly instead of letting a red run sit unnoticed (the incident: a failed
      # destroy was never re-actioned). Opens an issue; the ttl-reaper + budget
      # are the backstops.
      - name: escalate on failed teardown
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GH_DEPLOY_KEY_PAT }}
        run: |
          gh issue create --repo "${{ github.repository }}" \
            --title "infra-ops teardown FAILED (${{ inputs.operation }} ${{ inputs.region }}) — resources may still be billing" \
            --body "The ${{ inputs.operation }} run failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}. Resources from this stack may still exist and be billing. Check the run log, re-run the teardown, and verify with the ttl-reaper. (A6 escalation; budget alarm is the \$ backstop.)" \
            || echo "::warning::issue create failed (non-fatal); check the run log manually"
