name: infra-ops

# Workflow-dispatch only — operator-triggered one-shots, DR drill, and the
# ttl-reaper's auto-destroy target.
#
# Available operations:
#   - bootstrap         : create S3 bucket + DynamoDB lock table (one-time)
#   - destroy-region    : destroy a single region's regional stack (DR drill / reaper)
#   - destroy-platform  : destroy platform env (post-submission cleanup)
#
# MULTI-ACCOUNT (W3 / accounts-dimension ADR): the destroy paths derive the
# state bucket (aegis-platform-aws-tfstate-<account_id>) and the destroy role
# (arn:aws:iam::<account_id>:role/gh-tf-destroy-platform) from the account_id
# input — no per-account TFSTATE_BUCKET / AWS_DESTROY_ROLE_ARN secret.
# Two destroy paths:
#   - human dispatch (reaper=false, default): environment `destroy` — required
#     reviewer, unchanged (A7, incident 2026-06-06).
#   - reaper dispatch (reaper=true): environment `reaper-destroy` — NO
#     reviewers (unattended), but an in-job guard re-verifies the target
#     cluster exists, carries no keep/ttl-exempt tag, and is past ttl_hours
#     BEFORE terraform runs. Ungated but safe-by-construction.
#
# Bootstrap uses LOCAL state, applied in CI's ephemeral runner — operator
# uploads the resulting state to a one-off artifact + manually configures
# the GH Actions secret TFSTATE_REGION afterwards.
#
# ADR-13 — DAY-ZERO SEED runs from the OPERATOR'S LAPTOP via break-glass /
# AWSControlTowerExecution, NOT from this CI job. Bootstrap now SEEDS the four
# CI roles (iam-seed.tf), including gh-tf-apply-platform — the very role the CI
# bootstrap job below assumes (AWS_INFRA_APPLY_ROLE_ARN). On a true cold start
# (no roles exist yet) that role cannot assume itself into existence
# (chicken-egg). So the FIRST apply of envs/bootstrap in a new account is an
# operator-local `terraform apply` as a principal that can write IAM (the org
# SCP denies IAM writes to SSO principals but permits the gh-tf-* / break-glass
# / Control-Tower seed principal). Once the roles exist, this CI bootstrap job
# can re-apply envs/bootstrap to reconcile baseline drift (the roles are
# prevent_destroy, so a re-apply never deletes them).

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Operation to run
        required: true
        type: choice
        options:
          - bootstrap
          - destroy-region
          - destroy-platform
      region:
        description: Region (required for destroy-region)
        required: false
        type: string
        default: ""
      account_id:
        description: Target AWS account id (see accounts.json; default = prod for back-compat)
        required: false
        type: string
        default: "506221082337"
      reaper:
        description: Reaper-dispatched run (ungated reaper-destroy environment + in-job reapability guard)
        required: false
        type: boolean
        default: false
      ttl_hours:
        description: TTL threshold the reaper guard re-verifies (reaper path only)
        required: false
        type: string
        default: "8"

permissions:
  id-token: write
  contents: read
  issues: write # A6: open an alert issue if a teardown fails (still billing)

# Serialise per region — two destroys racing one regional state corrupt it;
# never cancel a terraform run mid-flight (a killed destroy strands partial
# billable resources). Region is empty for bootstrap/destroy-platform, which
# collapses those onto one shared group — also correct (one platform state).
concurrency:
  group: infra-ops-${{ inputs.region }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "1"

jobs:
  # Bootstrap re-apply — assumes gh-tf-apply-platform (which envs/bootstrap now
  # SEEDS, ADR-13). This CI job is the RECONCILE path (baseline drift on an
  # already-seeded account); the DAY-ZERO seed is operator-local break-glass —
  # see the ADR-13 note in the header block above. Creates the state backend +
  # CI roles; not gated.
  ops:
    if: ${{ inputs.operation == 'bootstrap' }}
    runs-on: ubuntu-latest
    # Ceiling on a hung terraform apply (GitHub default is 6h).
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: bootstrap
        run: |
          cd terraform/envs/bootstrap
          terraform init && terraform apply -auto-approve -var-file="$GITHUB_WORKSPACE/regions.auto.tfvars.json"
          terraform output -raw backend_hcl
          echo ""
          echo "::warning::Set the region above as the GH Actions secret TFSTATE_REGION, then flip this account's bootstrap_complete=true in accounts.json. The bucket name is derived from the account id (aegis-platform-aws-tfstate-<account_id>) — no TFSTATE_BUCKET secret needed (accounts-dimension ADR)."

  # Teardown — HUMAN-GATED by default (A7, incident 2026-06-06). The `destroy`
  # environment has a required reviewer (the operator); this job pauses for
  # approval before assuming the destroy role, so ANY branch can dispatch a
  # teardown but prod is never deleted without an explicit human approval.
  # Uses the per-account gh-tf-destroy-platform role (OIDC trust =
  # environment:destroy + environment:reaper-destroy), NOT the main-only apply
  # role — that is what unblocks feature-branch teardowns (the incident's
  # failed attempt #2). reaper=true swaps in the UNGATED `reaper-destroy`
  # environment; the in-job guard below makes that path safe-by-construction.
  destroy:
    if: ${{ inputs.operation == 'destroy-region' || inputs.operation == 'destroy-platform' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.reaper && 'reaper-destroy' || 'destroy' }}
    # Ceiling on a hung terraform destroy (the kyverno-deadlock shape). The
    # `destroy` environment's approval wait does NOT count toward this — the
    # job has not started while it waits for the required reviewer.
    timeout-minutes: 90
    # Same group keys as the W3 apply jobs (infra-apply-account.yml): a destroy
    # queues behind, never races, an in-flight apply of the same account+region.
    concurrency:
      group: ${{ inputs.operation == 'destroy-region' && format('infra-{0}-{1}', inputs.account_id, inputs.region) || format('infra-{0}-platform', inputs.account_id) }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: reaper may only destroy-region
        if: ${{ inputs.reaper && inputs.operation != 'destroy-region' }}
        run: |
          echo "::error::reaper=true is only valid with operation=destroy-region (the guard verifies a single regional cluster)"
          exit 1
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: arn:aws:iam::${{ inputs.account_id }}:role/gh-tf-destroy-platform
          aws-region: ${{ env.AWS_REGION }}

      - name: destroy-region init
        if: ${{ inputs.operation == 'destroy-region' }}
        working-directory: terraform/envs/regional
        run: |
          if [[ -z "${{ inputs.region }}" ]]; then
            echo "::error::region input is required for destroy-region"
            exit 1
          fi
          terraform init -reconfigure \
            -backend-config="bucket=aegis-platform-aws-tfstate-${{ inputs.account_id }}" \
            -backend-config="region=${{ secrets.TFSTATE_REGION }}" \
            -backend-config="key=regional/${{ inputs.region }}/terraform.tfstate" \
            -backend-config="encrypt=true"

      - name: reaper guard (re-verify reapability before terraform)
        if: ${{ inputs.operation == 'destroy-region' && inputs.reaper }}
        working-directory: terraform/envs/regional
        run: |
          set -euo pipefail
          # The reaper path is UNGATED (no reviewer), so it must be
          # safe-by-construction: re-verify, against live AWS, that the state's
          # cluster (a) exists, (b) carries NO keep/ttl-exempt tag, (c) is past
          # ttl_hours. Abort otherwise — the scan-time decision may be stale.
          r='${{ inputs.region }}'
          ttl='${{ inputs.ttl_hours }}'
          cluster="$(terraform output -raw cluster_name 2>/dev/null || true)"
          if [ -z "$cluster" ]; then
            echo "::error::reaper guard: no cluster_name output in the regional state for ${r} — nothing verifiable to reap. Aborting; a human can dispatch destroy-region without reaper=true."
            exit 1
          fi
          created="$(aws eks describe-cluster --name "$cluster" --region "$r" --query 'cluster.createdAt' --output text 2>/dev/null || true)"
          if [ -z "$created" ] || [ "$created" = "None" ]; then
            echo "::error::reaper guard: cluster '${cluster}' not found in ${r} (state/reality drift) — aborting."
            exit 1
          fi
          ex="$(aws eks describe-cluster --name "$cluster" --region "$r" --query 'cluster.tags."ttl-exempt" || cluster.tags.keep' --output text 2>/dev/null || echo None)"
          if [ "$ex" = "true" ]; then
            echo "::error::reaper guard: cluster '${cluster}' carries keep=true/ttl-exempt=true — aborting."
            exit 1
          fi
          now=$(date -u +%s)
          e=$(date -u -d "$created" +%s 2>/dev/null || echo 0)
          if [ "$e" -le 0 ] || [ $(( now - e )) -lt $(( ttl * 3600 )) ]; then
            echo "::error::reaper guard: cluster '${cluster}' is not past TTL (${ttl}h) — aborting."
            exit 1
          fi
          echo "reaper guard PASSED: '${cluster}' in ${r} exists, is not exempt, age $(( (now - e) / 3600 ))h >= ${ttl}h."

      - name: destroy-region
        if: ${{ inputs.operation == 'destroy-region' }}
        env:
          TF_VAR_region:         ${{ inputs.region }}
          TF_VAR_tfstate_bucket: aegis-platform-aws-tfstate-${{ inputs.account_id }}
          TF_VAR_tfstate_region: ${{ secrets.TFSTATE_REGION }}
          TF_VAR_github_token:   ${{ secrets.GH_DEPLOY_KEY_PAT }}
        run: |
          r='${{ inputs.region }}'
          # Per-region scalars + platform_region — all from the single
          # SoT, regions.auto.tfvars.json.
          TF_VAR_platform_region="$(jq -r '.platform_region' regions.auto.tfvars.json)"
          export TF_VAR_platform_region
          eval "$(jq -r --arg r "$r" '.regions[$r] | "TF_VAR_node_instance=\(.node_instance); TF_VAR_node_min=\(.node_min); TF_VAR_node_max=\(.node_max)"' regions.auto.tfvars.json)"
          export TF_VAR_node_instance TF_VAR_node_min TF_VAR_node_max
          # Workload overlay selector for this account, from HEAD accounts.json
          # (accounts-dimension ADR) — mirrors the apply path's TF_VAR_environment.
          TF_VAR_environment="$(jq -r --arg id '${{ inputs.account_id }}' '[.accounts[] | select(.account_id == $id) | .environment] | first // "prod"' accounts.json)"
          export TF_VAR_environment
          # Per-account SSO operator ARN (accounts-dimension ADR) — replaces the
          # OPERATOR_PRINCIPAL_ARN repo secret: the SSO role's account id + name
          # hash differ per account, so one secret cannot serve both.
          TF_VAR_operator_principal_arn="$(jq -r --arg id '${{ inputs.account_id }}' '[.accounts[] | select(.account_id == $id) | .operator_principal_arn] | first // ""' accounts.json)"
          if [ -z "$TF_VAR_operator_principal_arn" ]; then
            echo "::error::no operator_principal_arn for account ${{ inputs.account_id }} in accounts.json"
            exit 1
          fi
          export TF_VAR_operator_principal_arn
          # registries.auto.tfvars.json is gitignored — materialise it from the
          # REGISTRIES_JSON repo variable (same as infra-apply / infra-plan).
          printf '%s' '${{ vars.REGISTRIES_JSON }}' > "$GITHUB_WORKSPACE/registries.auto.tfvars.json"

          # ─── Ephemeral-cluster teardown (root-fix for the kyverno + ALB
          # teardown deadlocks; supersedes the inert A4 webhook null_resource).
          # For a disposable cluster you do NOT graceful-uninstall the in-cluster
          # charts — you delete the cluster and let it reap them. The helm
          # uninstall path deadlocks on kyverno's fail-closed admission webhooks +
          # finalizers (2026-06-06 incident; A4's predestroy cleanup never ran —
          # the runner has no kubectl). Industry norm for ephemeral clusters:
          # delete the cluster, skip the graceful uninstall. So:
          #   1. kubectl (the destroy role has an EKS access entry since the
          #      cluster-admin-principals change) — best-effort.
          #   2. pre-destroy.sh: drop the greeter Ingress so a HEALTHY ALB
          #      controller deletes its ALB (ENIs/EIPs that would DependencyViolation
          #      the VPC destroy).
          #   3. AWS-API ALB backstop scoped to the cluster's VPC — for a WEDGED
          #      controller where step 2 cannot trigger cleanup.
          #   4. state rm every helm_release / kubernetes_ resource so terraform
          #      NEVER attempts a graceful uninstall (the kyverno deadlock) —
          #      the cluster deletion reaps them instead.
          #   5. terraform destroy the AWS infra.
          # Use the env-provided region (TF_VAR_region) and validate its shape —
          # never splice a workflow_dispatch input straight into the shell.
          r="$TF_VAR_region"
          if ! printf '%s' "$r" | grep -qE '^[a-z]{2}-[a-z]+-[0-9]+$'; then
            echo "::error::region '${r}' is not a valid AWS region"; exit 1
          fi
          # Derive the cluster name from the already-initialised terraform state
          # (destroy-region init ran in the preceding step with working-directory
          # terraform/envs/regional). Fall back to the canonical convention so the
          # script stays runnable even when state is empty.
          CLUSTER="$(terraform -chdir=terraform/envs/regional output -raw cluster_name 2>/dev/null || echo "aegis-platform-${r}")"
          curl -sSL -o /usr/local/bin/kubectl "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" && chmod +x /usr/local/bin/kubectl || echo "::warning::kubectl install failed — in-cluster pre-destroy will be skipped"
          bash "$GITHUB_WORKSPACE/scripts/dr/pre-destroy.sh" "$r" "$CLUSTER" || echo "::warning::pre-destroy (graceful ALB cleanup) did not complete — the AWS-API backstop below covers a wedged controller"
          VPC="$(aws eks describe-cluster --name "$CLUSTER" --region "$r" --query 'cluster.resourcesVpcConfig.vpcId' --output text 2>/dev/null || echo '')"
          if [ -n "$VPC" ] && [ "$VPC" != "None" ]; then
            for arn in $(aws elbv2 describe-load-balancers --region "$r" --query "LoadBalancers[?VpcId=='${VPC}'].LoadBalancerArn" --output text 2>/dev/null); do
              echo "teardown backstop: deleting orphaned ALB ${arn} in ${VPC}"
              aws elbv2 delete-load-balancer --load-balancer-arn "$arn" --region "$r" 2>/dev/null || true
            done
            # delete-load-balancer is async; a fixed sleep races the ELB-owned ENI
            # cleanup → DependencyViolation on the VPC destroy. Poll until no ELBv2
            # remains in the VPC (then a short ENI-settle), up to 5 min.
            deadline=$(( $(date +%s) + 300 ))
            while [ -n "$(aws elbv2 describe-load-balancers --region "$r" --query "LoadBalancers[?VpcId=='${VPC}'].LoadBalancerArn" --output text 2>/dev/null)" ]; do
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "::warning::ELBv2 still present in ${VPC} after 5 min — terraform destroy may retry on DependencyViolation"; break
              fi
              sleep 15
            done
            sleep 20  # ENIs detach a beat after the LB record disappears
            # The controller-owned backend SG (k8s-traffic-<cluster>-*, tag
            # elbv2.k8s.aws/cluster) is NOT swept here: a one-shot pre-destroy sweep
            # runs too early (the SG is still attached to node ENIs). It is reaped by
            # the background loop that runs CONCURRENTLY with `terraform destroy` below,
            # behind the enableBackendSecurityGroup=false source fix in
            # modules/regional-stack/alb-controller.tf (2026-06-17).
          fi

          cd terraform/envs/regional
          # Guarded auto-unlock (S3 native lock). This job serializes per account+region
          # via its concurrency group (infra-<account>-<region>), so any <key>.tflock
          # here is orphaned by a dead predecessor run (cancelled / OOM / timeout), never
          # a live peer — clear it so an interrupted run self-heals instead of wedging
          # the next on a stale lock. (2026-06-18: a cancelled destroy left a state-rm
          # lock that failed the next run. The state-rm loop below is the first lock
          # acquisition — unlock before it.)
          BKT="aegis-platform-aws-tfstate-${{ inputs.account_id }}"
          LOCK="s3://${BKT}/regional/${r}/terraform.tfstate.tflock"
          if aws s3 ls "$LOCK" >/dev/null 2>&1; then
            echo "::warning::clearing orphaned terraform lock ${LOCK}"
            aws s3 rm "$LOCK"
          fi
          # state rm the in-cluster layer (idempotent: no-op if already gone) so
          # `terraform destroy` skips the deadlock-prone graceful helm uninstall.
          terraform state list 2>/dev/null | grep -E 'helm_release\.|kubernetes_' | while read -r addr; do
            echo "teardown: state rm ${addr} (cluster deletion will reap it)"
            terraform state rm "$addr" || true
          done
          # A (2026-06-17 root-fix): reap controller-orphaned SGs CONCURRENTLY with
          # terraform destroy. terraform's aws_vpc delete retries DependencyViolation
          # internally and does NOT give up (staging spun 30+ min on a k8s-traffic-* SG
          # still attached to node ENIs). The SG becomes deletable only once the
          # nodegroup ENIs detach DURING this destroy, so we reap in the background
          # every 20s; the instant the SG is free it is deleted and the in-flight VPC
          # delete completes. The reaper is killed once destroy returns.
          reap_orphan_sgs() {
            while sleep 20; do
              for sg in $(aws ec2 describe-security-groups --region "$r" \
                --filters "Name=tag:elbv2.k8s.aws/cluster,Values=${CLUSTER}" \
                --query 'SecurityGroups[].GroupId' --output text 2>/dev/null); do
                ing="$(aws ec2 describe-security-groups --region "$r" --group-ids "$sg" --query 'SecurityGroups[0].IpPermissions' --output json 2>/dev/null || echo '[]')"
                [ "$ing" != "[]" ] && aws ec2 revoke-security-group-ingress --region "$r" --group-id "$sg" --ip-permissions "$ing" >/dev/null 2>&1 || true
                aws ec2 delete-security-group --region "$r" --group-id "$sg" 2>/dev/null \
                  && echo "bg-reaper: deleted orphaned controller SG ${sg}" || true
              done
            done
          }
          reap_orphan_sgs & REAPER_PID=$!
          DESTROY_RC=0
          terraform destroy -auto-approve -var-file="$GITHUB_WORKSPACE/registries.auto.tfvars.json" || DESTROY_RC=$?
          kill "$REAPER_PID" 2>/dev/null || true; wait "$REAPER_PID" 2>/dev/null || true
          # (b)+(c) Verified teardown. A green destroy can still be wrong if the VPC
          # delete actually failed on a lingering ALB SG and terraform was about to
          # spin (or did spin and gave up). After destroy returns, assert that NO
          # orphan ALB and NO controller-owned SG remain — if any do, fail LOUD with
          # an actionable message rather than reporting a clean teardown while the
          # account still bills (a stuck VPC keeps NAT/EIP/ENI charges live).
          if [ -n "$VPC" ] && [ "$VPC" != "None" ]; then
            REMAIN_LB="$(aws elbv2 describe-load-balancers --region "$r" --query "LoadBalancers[?VpcId=='${VPC}'].LoadBalancerArn" --output text 2>/dev/null || echo '')"
          else
            REMAIN_LB=''
          fi
          REMAIN_SG="$(aws ec2 describe-security-groups --region "$r" --filters "Name=tag:elbv2.k8s.aws/cluster,Values=${CLUSTER}" --query 'SecurityGroups[].GroupId' --output text 2>/dev/null || echo '')"
          if [ -n "$REMAIN_LB" ] || [ -n "$REMAIN_SG" ]; then
            echo "::error::teardown left orphan AWS objects — VPC ${VPC} may be stuck (still billing). ALB(s): [${REMAIN_LB:-none}] · controller SG(s): [${REMAIN_SG:-none}]. Delete them (aws elbv2 delete-load-balancer / aws ec2 delete-security-group --group-id <id>) then re-dispatch infra-ops destroy-region for account ${{ inputs.account_id }} ${r}."
            [ "$DESTROY_RC" -eq 0 ] && DESTROY_RC=1
          fi
          if [ "$DESTROY_RC" -ne 0 ]; then
            echo "::error::destroy-region did NOT complete cleanly (rc=${DESTROY_RC}) — resources may STILL BE BILLING. Re-dispatch infra-ops destroy-region (account ${{ inputs.account_id }}, ${r}); ttl-reaper + budget are only backstops."
          fi
          exit "$DESTROY_RC"

      - name: destroy-platform
        if: ${{ inputs.operation == 'destroy-platform' }}
        env:
          # ── Topology vars: derived from accounts.json in the run block below.
          # TF_VAR_environment, TF_VAR_deployment_account_id, and
          # TF_VAR_cluster_pull_account_ids are exported there (same jq pattern
          # as the apply-platform step in infra-apply-account.yml). They cannot
          # sit in the env block because infra-ops has no caller that passes them
          # as workflow inputs — they must be read from accounts.json at run time.
          #
          # ── Secret-backed vars: mirrored from the apply-platform step surface.
          TF_VAR_grafana_cloud_api_token:             ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
          TF_VAR_grafana_auth_token:                  ${{ secrets.GRAFANA_AUTH_TOKEN }}
          TF_VAR_grafana_cloud_mimir_username:        ${{ secrets.GRAFANA_CLOUD_MIMIR_USERNAME }}
          TF_VAR_grafana_cloud_loki_username:         ${{ secrets.GRAFANA_CLOUD_LOKI_USERNAME }}
          TF_VAR_grafana_cloud_tempo_username:        ${{ secrets.GRAFANA_CLOUD_TEMPO_USERNAME }}
          TF_VAR_grafana_cloud_pyroscope_username:    ${{ secrets.GRAFANA_CLOUD_PYROSCOPE_USERNAME }}
          TF_VAR_grafana_cloud_mimir_url:             ${{ secrets.GRAFANA_CLOUD_MIMIR_URL }}
          TF_VAR_grafana_cloud_loki_url:              ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          TF_VAR_grafana_cloud_tempo_url:             ${{ secrets.GRAFANA_CLOUD_TEMPO_URL }}
          TF_VAR_grafana_cloud_pyroscope_url:         ${{ secrets.GRAFANA_CLOUD_PYROSCOPE_URL }}
          TF_VAR_budget_alert_email:                  ${{ secrets.BUDGET_ALERT_EMAIL }}
          TF_VAR_github_token:                        ${{ secrets.GH_DEPLOY_KEY_PAT }}
          TF_VAR_enable_cloudwatch_datasource:        ${{ vars.ENABLE_CLOUDWATCH_DATASOURCE || 'false' }}
          TF_VAR_grafana_cloud_aws_account_id:        ${{ secrets.GRAFANA_CLOUD_AWS_ACCOUNT_ID }}
          TF_VAR_grafana_cloud_external_id:           ${{ secrets.GRAFANA_CLOUD_EXTERNAL_ID }}
        run: |
          # ── Derive topology vars from accounts.json (same source as infra-prod
          # / infra-staging callers). Keys are logical names; find the entry whose
          # .account_id matches the input, fall back to safe defaults.
          TF_VAR_environment="$(jq -r --arg id '${{ inputs.account_id }}' \
            '[.accounts[] | select(.account_id == $id) | .environment] | first // "prod"' \
            accounts.json)"
          if [ -z "$TF_VAR_environment" ] || ! { [ "$TF_VAR_environment" = "staging" ] || [ "$TF_VAR_environment" = "prod" ]; }; then
            echo "::error::no valid environment for account ${{ inputs.account_id }} in accounts.json (got '${TF_VAR_environment}')"
            exit 1
          fi
          TF_VAR_deployment_account_id="$(jq -r --arg id '${{ inputs.account_id }}' \
            '[.accounts[] | select(.account_id == $id) | .deployment_account_id // ""] | first // ""' \
            accounts.json)"
          # cluster_pull_account_ids: all cluster account ids (same formula the
          # infra-prod / infra-staging callers use: jq -c '[.accounts[].account_id]').
          TF_VAR_cluster_pull_account_ids="$(jq -c '[.accounts[].account_id]' accounts.json)"
          export TF_VAR_environment TF_VAR_deployment_account_id TF_VAR_cluster_pull_account_ids

          cd terraform/envs/platform
          terraform init -reconfigure \
            -backend-config="bucket=aegis-platform-aws-tfstate-${{ inputs.account_id }}" \
            -backend-config="region=${{ secrets.TFSTATE_REGION }}" \
            -backend-config="encrypt=true"
          # Guarded auto-unlock (S3 native lock). This job serializes per account via
          # its concurrency group (infra-<account>-platform), so any <key>.tflock here
          # is orphaned by a dead predecessor run (cancelled / OOM / timeout), never a
          # live peer — clear it so an interrupted run self-heals instead of wedging the
          # next on a stale lock. (2026-06-18: a cancelled destroy left a state-rm lock
          # that failed the next run.)
          BKT="aegis-platform-aws-tfstate-${{ inputs.account_id }}"
          LOCK="s3://${BKT}/platform/terraform.tfstate.tflock"
          if aws s3 ls "$LOCK" >/dev/null 2>&1; then
            echo "::warning::clearing orphaned terraform lock ${LOCK}"
            aws s3 rm "$LOCK"
          fi

          # ── Self-delete hazard: STRUCTURALLY FIXED by ADR-13 ─────────────────
          # gh-tf-destroy-platform (the role this job runs AS) + its admin
          # attachment used to be managed in THIS platform state, so a plain
          # `terraform destroy` deleted them mid-run, invalidated the live STS
          # session, and left a half-destroyed platform (2026-06-06 incident
          # shape). The previous fix was a pre-destroy `state rm` here — but that
          # left an ORPHANED admin role out-of-state in both accounts (next-cycle
          # EntityAlreadyExists) and, with the apply/CI roles also deleted,
          # produced the cold-start chicken-egg observed 2026-06-12.
          #
          # ADR-13 moves the four CI roles to envs/bootstrap (LOCAL state, the
          # operator-seeded layer that survives teardown-to-zero). This platform
          # state no longer contains the destroy role, so destroy cannot touch it
          # — no state-rm needed, no orphan, no chicken-egg. The state-rm lines
          # were removed deliberately; do not re-add them.

          terraform destroy -auto-approve -var-file="$GITHUB_WORKSPACE/regions.auto.tfvars.json"

      # Reset BOOTSTRAP_COMPLETE after a successful destroy-platform.
      # The repo-level var gates infra-plan and infra-apply: leaving it `true`
      # after teardown makes subsequent plan/apply jobs attempt to assume the
      # just-deleted gh-tf-apply-platform IAM role → OIDC AssumeRole fails
      # (live red light 2026-06-12). Reset it here so the post-teardown plan
      # no longer tries to authenticate against a deleted role.
      #
      # Token: GITHUB_TOKEN cannot set repo variables — it does not carry
      # `actions:write` scope for repo-variable mutations (requires admin or a
      # fine-grained PAT with the `variables` permission). Use GH_DEPLOY_KEY_PAT,
      # the same PAT this job already uses for the escalation step.
      - name: reset BOOTSTRAP_COMPLETE after successful destroy-platform
        if: ${{ inputs.operation == 'destroy-platform' && success() }}
        env:
          GH_TOKEN: ${{ secrets.GH_DEPLOY_KEY_PAT }}
        run: |
          gh variable set BOOTSTRAP_COMPLETE --body "false" --repo "${{ github.repository }}"
          echo "::notice::BOOTSTRAP_COMPLETE reset to false — subsequent infra-plan/apply will skip the deleted IAM roles cleanly."

      # A6: a FAILED destroy means resources may still be billing — escalate
      # loudly instead of letting a red run sit unnoticed (the incident: a failed
      # destroy was never re-actioned). Opens an issue; the ttl-reaper + budget
      # are the backstops.
      - name: escalate on failed teardown
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GH_DEPLOY_KEY_PAT }}
        run: |
          gh issue create --repo "${{ github.repository }}" \
            --title "infra-ops teardown FAILED (${{ inputs.operation }} ${{ inputs.region }} account ${{ inputs.account_id }}) — resources may still be billing" \
            --body "The ${{ inputs.operation }} run failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}. Resources from this stack may still exist and be billing. Check the run log, re-run the teardown, and verify with the ttl-reaper. (A6 escalation; budget alarm is the \$ backstop.)" \
            || echo "::warning::issue create failed (non-fatal); check the run log manually"
