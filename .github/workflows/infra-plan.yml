name: infra-plan

# PR → fmt + validate + lint + sec + plan per env (platform + regional matrix).
# Plan diff is posted as a PR comment. Branch protection on `main` requires
# the `summary` job to pass before merge.
#
# Role assumed: aegis-platform-aws-ci (ReadOnlyAccess, trust = any ref on this
# repo). Cannot apply — that role is infra_apply on push-to-main only.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]   # also runs on main, but apply happens in infra-apply.yml

permissions:
  id-token: write     # required for OIDC -> AWS
  contents: read
  pull-requests: write   # for posting plan diff comments

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "1"

jobs:
  setup:
    name: setup-matrix
    runs-on: ubuntu-latest
    outputs:
      enabled_regions: ${{ steps.regions.outputs.list }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: regions
        name: extract enabled regions from regions.auto.tfvars.json
        run: |
          list=$(jq -c '[.regions | to_entries[] | select(.value.enabled) | .key]' regions.auto.tfvars.json)
          echo "list=${list}" >> "$GITHUB_OUTPUT"
          echo "Active regions: ${list}"

  gitleaks:
    name: gitleaks-secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # full history so the scan sees every commit
      - name: gitleaks
        # `detect --source .` scans the full git history directly. The
        # gitleaks-action's push-range diff fails when the range includes the
        # repo's root commit — `root^` is not a valid revision — which every
        # fresh repo hits on its first push. A direct full-history scan has no
        # range to compute and is robust on any push.
        run: |
          ver=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --no-banner --exit-code 1

  lint-validate:
    name: fmt-validate-lint-sec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - name: install project-local tools (tflint / trivy / jq / gitleaks)
        run: ./scripts/install-tools.sh "$PWD/bin"
      - name: fmt-check
        run: terraform fmt -recursive -check terraform/
      - name: validate
        run: |
          for env in bootstrap platform regional; do
            ( cd "terraform/envs/$env" && terraform init -backend=false && terraform validate )
          done
      - name: lint
        run: ./bin/tflint --recursive --chdir=terraform/
      - name: sec
        # trivy (successor to the EOL tfsec, which cannot parse TF 1.5 `check`
        # blocks). --tf-exclude-downloaded-modules drops findings in registry
        # modules; --skip-dirs drops the example k8s manifests bundled inside
        # them. Gate on MEDIUM+ (our code is clean at that bar; 2 pre-existing
        # LOW S3-logging findings are informational).
        run: ./bin/trivy config terraform/ --tf-exclude-downloaded-modules --skip-dirs '**/.terraform/**' --severity MEDIUM,HIGH,CRITICAL --exit-code 1

  terraform-test:
    # Cold-start gate (ADR-21 §D.2 layer 1). Runs the mock-only
    # tests/cold_start.tftest.hcl against envs/regional with NO AWS credentials —
    # mock_provider makes zero cloud calls and `command = plan` creates nothing, so
    # this is a FREE PR gate that runs on every PR (no BOOTSTRAP_COMPLETE gate, no
    # OIDC). It catches the cold-start plan-time bug classes the WS3 prod go-live hit
    # (empty-state survival #106, zone-fallback placeholders #107, region-suffix IAM
    # name collisions #108 / ADR-21 §C) before they reach a billable apply.
    name: terraform-test
    runs-on: ubuntu-latest
    needs: [lint-validate]
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - name: terraform test (regional cold-start, mock-only, no AWS creds)
        run: |
          cd terraform/envs/regional
          # -backend=false: the test mocks the providers and overrides the platform
          # remote_state, so no S3 backend / no credentials are needed. init only
          # installs the modules + provider plugins.
          terraform init -backend=false
          terraform test

  crossplane-validate:
    name: crossplane-render-validate
    runs-on: ubuntu-latest
    # WS4 Axis A (ADR-22): offline composition gate for the XBucket XRD/Composition.
    # Pure offline — no AWS, no cluster — so it does NOT gate on BOOTSTRAP_COMPLETE
    # and runs on every PR. ubuntu-latest ships Docker, so `crossplane composition
    # render` (which runs the function in a container) executes here, unlike a
    # Docker-free local host where it is skipped.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.16.4
      - name: install crossplane CLI (project-local bin/)
        run: ./scripts/install-crossplane.sh "$PWD/bin"
      - name: render + validate the XBucket composition
        # Steps [1][2] schema-validate the XRD + Composition + provider-aws-s3
        # + function (download schemas, no cluster). Step [3] renders the
        # composed Bucket + BucketPublicAccessBlock via Docker. Non-zero exit
        # on any schema/render failure fails the gate.
        run: BIN="$PWD/bin" ./scripts/crossplane-validate.sh

  plan-platform:
    name: plan-platform
    runs-on: ubuntu-latest
    needs: [setup, lint-validate]
    # Skips until the operator has run bootstrap + platform locally and
    # set the BOOTSTRAP_COMPLETE repo variable. Before that the AWS IAM
    # roles + GitHub OIDC provider don't exist, so OIDC role assumption
    # can't succeed — skipping keeps the pipeline green instead of
    # failing on an unavoidable bootstrap-ordering gap.
    if: ${{ vars.BOOTSTRAP_COMPLETE == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: derive backend config
        run: |
          # Bootstrap state is operator-applied once and lives on local disk;
          # CI reads bucket/region from GH Actions secrets set after bootstrap.
          # No dynamodb_table — TF ≥ 1.11 native S3 locking via use_lockfile
          # (declared in platform/backend.tf).
          cat <<EOF > backend.hcl
          bucket  = "${{ secrets.TFSTATE_BUCKET }}"
          region  = "${{ secrets.TFSTATE_REGION }}"
          encrypt = true
          EOF
      - name: plan
        env:
          # WS3-R added a required `environment` var (no default) to envs/platform.
          # infra-plan previews against the staging state (TFSTATE_BUCKET), so pin
          # staging — also keeps the plan from showing a spurious zone rename
          # (staging.aws → prod.aws). The W3 apply path reads this per-account from
          # accounts.json (infra-apply-account.yml); this legacy preview is staging.
          TF_VAR_environment:                      staging
          TF_VAR_grafana_cloud_api_token:          ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
          TF_VAR_grafana_auth_token:               ${{ secrets.GRAFANA_AUTH_TOKEN }}
          TF_VAR_grafana_cloud_mimir_username:     ${{ secrets.GRAFANA_CLOUD_MIMIR_USERNAME }}
          TF_VAR_grafana_cloud_loki_username:      ${{ secrets.GRAFANA_CLOUD_LOKI_USERNAME }}
          TF_VAR_grafana_cloud_tempo_username:     ${{ secrets.GRAFANA_CLOUD_TEMPO_USERNAME }}
          TF_VAR_grafana_cloud_pyroscope_username: ${{ secrets.GRAFANA_CLOUD_PYROSCOPE_USERNAME }}
          TF_VAR_grafana_cloud_mimir_url:          ${{ secrets.GRAFANA_CLOUD_MIMIR_URL }}
          TF_VAR_grafana_cloud_loki_url:           ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          TF_VAR_grafana_cloud_tempo_url:          ${{ secrets.GRAFANA_CLOUD_TEMPO_URL }}
          TF_VAR_grafana_cloud_pyroscope_url:      ${{ secrets.GRAFANA_CLOUD_PYROSCOPE_URL }}
          TF_VAR_budget_alert_email:               ${{ secrets.BUDGET_ALERT_EMAIL }}
          TF_VAR_github_token:                     ${{ secrets.GH_DEPLOY_KEY_PAT }}
          TF_VAR_enable_cloudwatch_datasource:     ${{ vars.ENABLE_CLOUDWATCH_DATASOURCE || 'false' }}
          TF_VAR_grafana_cloud_aws_account_id:     ${{ secrets.GRAFANA_CLOUD_AWS_ACCOUNT_ID }}
          TF_VAR_grafana_cloud_external_id:        ${{ secrets.GRAFANA_CLOUD_EXTERNAL_ID }}
        run: |
          cd terraform/envs/platform
          terraform init -reconfigure -backend-config="$GITHUB_WORKSPACE/backend.hcl"
          # -lock=false on plan: ReadOnly IAM role can't write .tflock.
          terraform plan -lock=false -var-file="$GITHUB_WORKSPACE/regions.auto.tfvars.json" -out=plan.bin
          terraform show -no-color plan.bin > plan.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: plan-platform
          path: terraform/envs/platform/plan.txt

  plan-regional:
    name: "plan-regional (${{ matrix.region }})"
    runs-on: ubuntu-latest
    needs: [setup, lint-validate]
    # See plan-platform — gated on the operator-set BOOTSTRAP_COMPLETE.
    if: ${{ vars.BOOTSTRAP_COMPLETE == 'true' && needs.setup.outputs.enabled_regions != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJson(needs.setup.outputs.enabled_regions) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: extract per-region scalars
        id: scalars
        run: |
          r='${{ matrix.region }}'
          jq -r --arg r "$r" '.regions[$r] | "node_instance=\(.node_instance)\nnode_min=\(.node_min)\nnode_max=\(.node_max)"' \
            regions.auto.tfvars.json >> "$GITHUB_OUTPUT"
      - name: extract platform_region (single SoT)
        id: pr
        run: |
          echo "platform_region=$(jq -r '.platform_region' regions.auto.tfvars.json)" >> "$GITHUB_OUTPUT"
      - name: plan
        env:
          TF_VAR_region:          ${{ matrix.region }}
          TF_VAR_node_instance:   ${{ steps.scalars.outputs.node_instance }}
          TF_VAR_node_min:        ${{ steps.scalars.outputs.node_min }}
          TF_VAR_node_max:        ${{ steps.scalars.outputs.node_max }}
          TF_VAR_platform_region: ${{ steps.pr.outputs.platform_region }}
          TF_VAR_tfstate_bucket:  ${{ secrets.TFSTATE_BUCKET }}
          TF_VAR_tfstate_region:  ${{ secrets.TFSTATE_REGION }}
          TF_VAR_github_token:    ${{ secrets.GH_DEPLOY_KEY_PAT }}
          TF_VAR_operator_principal_arn: ${{ secrets.OPERATOR_PRINCIPAL_ARN }}
        run: |
          # registries.auto.tfvars.json is gitignored (per-workload ECR account
          # IDs) so it is not in the checkout — materialise it from the
          # REGISTRIES_JSON repo variable for CI.
          printf '%s' '${{ vars.REGISTRIES_JSON }}' > "$GITHUB_WORKSPACE/registries.auto.tfvars.json"
          cd terraform/envs/regional
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
            -backend-config="region=${{ secrets.TFSTATE_REGION }}" \
            -backend-config="key=regional/${{ matrix.region }}/terraform.tfstate" \
            -backend-config="encrypt=true"
          # -lock=false on plan: ReadOnly IAM role (infra_ci) can't write
          # the .tflock file. Plan is read-only against state so lock skip
          # is safe; apply (separate job, infra_apply role with S3 write)
          # acquires the lock normally.
          terraform plan -lock=false -var-file="$GITHUB_WORKSPACE/registries.auto.tfvars.json" -out=plan.bin
          terraform show -no-color plan.bin > plan-${{ matrix.region }}.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: plan-regional-${{ matrix.region }}
          path: terraform/envs/regional/plan-${{ matrix.region }}.txt

  comment-pr:
    name: comment-plan-diff
    runs-on: ubuntu-latest
    needs: [plan-platform, plan-regional]
    if: ${{ always() && github.event_name == 'pull_request' && vars.BOOTSTRAP_COMPLETE == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: plans/
      - name: post combined plan diff as PR comment
        uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff # v3
        with:
          header: terraform-plan
          message: |
            ## Terraform plan

            <details><summary>platform</summary>

            ```
            $(cat plans/plan-platform/plan.txt 2>/dev/null | head -500)
            ```

            </details>

            $(for d in plans/plan-regional-*; do
              region=$(basename "$d" | sed 's/^plan-regional-//')
              echo "<details><summary>regional / $region</summary>"
              echo ""
              echo '```'
              cat "$d"/plan-*.txt 2>/dev/null | head -500
              echo '```'
              echo ""
              echo "</details>"
            done)

  summary:
    # Single status check context for branch protection. Succeeds only if
    # all upstream jobs are green.
    name: summary
    runs-on: ubuntu-latest
    needs: [gitleaks, lint-validate, terraform-test, crossplane-validate, plan-platform, plan-regional]
    if: ${{ always() }}
    steps:
      - name: verify all upstream jobs succeeded
        run: |
          # gitleaks + lint-validate + terraform-test + crossplane-validate MUST
          # succeed (all run credential-free / offline, so they never skip). plan
          # jobs may be `skipped` pre-bootstrap (BOOTSTRAP_COMPLETE unset) — that is
          # acceptable; only an actual `failure` fails the summary.
          ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }
          if [[ "${{ needs.gitleaks.result }}" != "success" ]] \
             || [[ "${{ needs.lint-validate.result }}" != "success" ]] \
             || [[ "${{ needs.terraform-test.result }}" != "success" ]] \
             || [[ "${{ needs.crossplane-validate.result }}" != "success" ]] \
             || ! ok "${{ needs.plan-platform.result }}" \
             || ! ok "${{ needs.plan-regional.result }}"; then
            echo "::error::A required job failed."
            exit 1
          fi
          echo "Required jobs green (plan jobs skipped pre-bootstrap is OK)."
