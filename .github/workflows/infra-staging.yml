name: infra-staging

# W3 caller — STAGING floats on main. A merge to main touching infra applies the
# staging account at its pin (`main` = HEAD). Ephemeral by cost design: staging
# clusters carry no `keep` tag, so the A11 ttl-reaper auto-destroys them after
# TTL_HOURS (REAPER_AUTODESTROY=true). version-gate is warn-only here (gate_blocks=false).
# See docs/runbooks/2026-06-12-joint-strike.md §W3.

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'regions.auto.tfvars.json'
      - 'accounts.json'
  # Manual re-apply: resolve reads accounts.json at HEAD, so a dispatch behaves
  # exactly like a push (same bootstrap_complete gate, same pin=main). Lets the
  # operator re-run staging after a CI-only fix without a dummy infra commit.
  workflow_dispatch:

# Workflow-level stays read-only; id-token is granted only to the job that
# calls the reusable workflow (the reusable's OIDC ceiling is the caller
# job's permissions — it cannot elevate, so the grant must sit there, and
# only there).
permissions:
  contents: read

# One staging run at a time (this caller targets exactly the staging account);
# queue, never cancel, a running apply. Per-account+region serialization is
# enforced again at job level inside the reusable.
concurrency:
  group: infra-staging
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve-staging (from HEAD accounts.json)
    runs-on: ubuntu-latest
    outputs:
      account_id:         ${{ steps.acc.outputs.account_id }}
      ref:                ${{ steps.acc.outputs.ref }}
      regions_json:       ${{ steps.acc.outputs.regions_json }}
      overrides_json:     ${{ steps.acc.outputs.overrides_json }}
      environment:        ${{ steps.acc.outputs.environment }}
      bootstrap_complete: ${{ steps.acc.outputs.bootstrap_complete }}
      operator_principal_arn: ${{ steps.acc.outputs.operator_principal_arn }}
      deployment_account_id: ${{ steps.acc.outputs.deployment_account_id }}
      cluster_pull_account_ids: ${{ steps.acc.outputs.cluster_pull_account_ids }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - id: acc
        run: |
          a="$(jq -c '.accounts.staging' accounts.json)"
          {
            echo "account_id=$(echo "$a" | jq -r '.account_id')"
            echo "ref=$(echo "$a" | jq -r '.pin')"
            echo "regions_json=$(echo "$a" | jq -c '.enabled_regions')"
            echo "overrides_json=$(echo "$a" | jq -c '.overrides // {}')"
            echo "environment=$(echo "$a" | jq -r '.environment // "prod"')"
            echo "bootstrap_complete=$(echo "$a" | jq -r '.bootstrap_complete // false')"
            echo "operator_principal_arn=$(echo "$a" | jq -r '.operator_principal_arn // ""')"
            echo "deployment_account_id=$(echo "$a" | jq -r '.deployment_account_id // ""')"
            echo "cluster_pull_account_ids=$(jq -c '[.accounts[].account_id]' accounts.json)"
          } >> "$GITHUB_OUTPUT"

  apply:
    needs: resolve
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/infra-apply-account.yml
    with:
      account_id:         ${{ needs.resolve.outputs.account_id }}
      ref:                ${{ needs.resolve.outputs.ref }}
      regions_json:       ${{ needs.resolve.outputs.regions_json }}
      overrides_json:     ${{ needs.resolve.outputs.overrides_json }}
      environment:        ${{ needs.resolve.outputs.environment }}
      bootstrap_complete: ${{ needs.resolve.outputs.bootstrap_complete == 'true' }}
      operator_principal_arn: ${{ needs.resolve.outputs.operator_principal_arn }}
      deployment_account_id: ${{ needs.resolve.outputs.deployment_account_id }}
      cluster_pull_account_ids: ${{ needs.resolve.outputs.cluster_pull_account_ids }}
      gate_blocks:        false
    secrets: inherit
