# ADR-07 enforcement four-pack #2 — cross-workload IAM-theft defense.
#
# An ACK `Role` CRD declares its trust relationship in
# `spec.assumeRolePolicyDocument` (a JSON string). This policy rejects any
# Role whose document names a `system:serviceaccount:<ns>:<sa>` subject in a
# namespace OTHER than the one the CRD itself lives in — so aegis-greeter's
# deploy repo physically cannot mint an IAM role that trusts
# `system:serviceaccount:aegis-core:aegis-core-engine`.
#
{{- /*
Helm note: Kyverno's own JsonPath-style substitutions are emitted verbatim via
Go backtick raw strings so Helm does not try to render them at chart-render
time — Kyverno resolves them at admission time. See the `key:` lines below
for the pattern.

This block is a Go-template comment because a plain YAML comment containing
literal Helm action delimiters breaks the parser (pre-existing bug discovered
during ADR-09 Phase 3 — the chart had been silently un-renderable since first
authored, dormant only because BOOTSTRAP_COMPLETE has never been set).
*/ -}}
#
# ⚠️ Known limitation refined at bootstrap: the two-condition check catches the
# primary attack (a Role that trusts a foreign SA without its own). RE2 has no
# negative lookahead, so a doc that trusts BOTH its own AND a foreign SA is a
# residual gap to tighten once exercised against a live cluster (issue #6).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: ack-role-trust-subject-must-match-namespace
  annotations:
    aegis.binhsu.org/enforcement: "four-pack-2-cross-workload-iam-theft"
    aegis.binhsu.org/status: "implemented, E2E PENDING platform bootstrap"
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: trust-subject-namespace-match
      match:
        any:
          - resources:
              kinds:
                - iam.services.k8s.aws/v1alpha1/Role
      validate:
        message: >-
          An ACK Role may only trust a ServiceAccount in its OWN namespace. Its
          assumeRolePolicyDocument names a ServiceAccount in another namespace —
          rejected (ADR-07 enforcement #2, cross-workload IAM-theft defense).
        deny:
          conditions:
            all:
              - key: "{{ `{{ regex_match('system:serviceaccount:', request.object.spec.assumeRolePolicyDocument) }}` }}"
                operator: Equals
                value: true
              - key: "{{ `{{ regex_match('system:serviceaccount:{{request.object.metadata.namespace}}:', request.object.spec.assumeRolePolicyDocument) }}` }}"
                operator: Equals
                value: false
