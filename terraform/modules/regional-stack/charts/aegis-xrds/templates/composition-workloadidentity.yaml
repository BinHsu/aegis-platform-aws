# ADR-09 Phase 3 — WorkloadIdentity → IAM Role Composition (Crossplane provider-aws-iam).
#
# Renders a single iam.aws.upbound.io/Role (Upbound upjet provider) from each
# XWorkloadIdentity. The trust policy is a fixed JSON template with three
# substitutions:
#   - <oidc-arn> + <oidc-host> — Helm-rendered at chart install (cluster-scoped)
#   - %s namespace + %s saName — Crossplane-patched at reconcile (workload-scoped)
#
# Why upjet, not ACK (2026-06-18, fix B): the ACK iam.services.k8s.aws/Role is a
# NAMESPACED MR. A cluster-scoped XR (XWorkloadIdentity) recording a ref to a
# namespaced composed resource forces Crossplane to write
# spec.resourceRefs[].namespace, which the XR CRD schema does not declare
# ("field not declared in schema") — the composite can never reconcile. The
# upjet iam.aws.upbound.io/Role is CLUSTER-SCOPED, so there is no namespace ref
# and the bug is gone. Crossplane's own provider family also keeps the IAM
# provider uniform with the rest of the multi-cloud control plane (ACK is
# AWS-only). See [[project_ws3_staging_bringup]] / ADR-09 amendment.
#
# AWS-side role identity: the IAM role NAME is the serviceAccountName
# (crossplane.io/external-name) and the PATH is .Values.iamRolePath, so the
# resulting ARN is arn:aws:iam::<acct>:role<path><saName> — which is exactly
# what the workload's ServiceAccount eks.amazonaws.com/role-arn annotation
# points at. (The retired ACK composition prefixed the name as
# aegis-workload-<ns>-<sa>, which never matched the SA annotation — a latent
# second bug this rewrite also fixes.)
#
# mode: Pipeline + function-patch-and-transform — same DSL as the deprecated
# mode: Resources, but on the non-deprecated rail (ADR-09 amendment: "v1
# Composition" = apiextensions.crossplane.io/v1 API + patch-and-transform DSL,
# not literal `mode: Resources`).

apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: workloadidentity-ack-iam-role
  annotations:
    aegis.binhsu.org/adr: "ADR-09 Phase 3"
    aegis.binhsu.org/status: "implemented, E2E PENDING platform bootstrap"
spec:
  compositeTypeRef:
    apiVersion: platform.aegis.io/v1alpha1
    kind: XWorkloadIdentity
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: iam-role
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: Role
              spec:
                # IRSA creds via the provider's ProviderConfig (default).
                providerConfigRef:
                  name: default
                forProvider:
                  path: {{ .Values.iamRolePath | quote }}
                  description: "Workload IRSA role provisioned by Crossplane Composition for WorkloadIdentity (ADR-09)."
                  tags:
                    managed-by: crossplane
                    aegis.platform/abstraction: WorkloadIdentity
            patches:
              # k8s object name — cluster-scoped now (no namespace). Combine
              # ns+sa so two workloads that share an SA name across namespaces
              # don't collide on the Role CR.
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.claimRef.namespace
                    - fromFieldPath: spec.parameters.serviceAccountName
                  strategy: string
                  string:
                    fmt: "%s-%s"
                toFieldPath: metadata.name
              # AWS-side IAM role NAME = serviceAccountName (upjet external
              # name). Combined with .Values.iamRolePath this is the exact ARN
              # the workload's SA annotation assumes.
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.serviceAccountName
                toFieldPath: metadata.annotations[crossplane.io/external-name]
              # Trust policy. The JSON template is rendered by Helm first
              # (.Values.* substituted), then Crossplane substitutes %s/%s at
              # reconcile from the Claim's namespace + SA name. Inputs are
              # DNS-1123, so no JSON-escape risk.
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.claimRef.namespace
                    - fromFieldPath: spec.parameters.serviceAccountName
                  strategy: string
                  string:
                    fmt: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Federated":"{{ .Values.oidcProviderArn }}"},"Action":"sts:AssumeRoleWithWebIdentity","Condition":{"StringEquals":{"{{ .Values.oidcProviderHost }}:sub":"system:serviceaccount:%s:%s","{{ .Values.oidcProviderHost }}:aud":"sts.amazonaws.com"}}}]}'
                toFieldPath: spec.forProvider.assumeRolePolicy
              # Optional managed-policy ARNs. upjet calls this managedPolicyArns
              # (a string list) — same shape as the claim's policyArns.
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.policyArns
                toFieldPath: spec.forProvider.managedPolicyArns
                policy:
                  fromFieldPath: Optional
