# DeploymentRuntimeConfig — supplies the restricted-PSA-compliant securityContext
# to Crossplane FUNCTION pods (referenced by function-patch-and-transform below).
#
# crossplane-system enforces pod-security.kubernetes.io/enforce=restricted
# (crossplane.tf, defensive posture, by design). The contrib
# function-patch-and-transform package's runtime pod (container "package-runtime")
# omits the fields the restricted profile requires — container capabilities.drop
# =[ALL] and seccompProfile, plus pod-level runAsNonRoot + seccompProfile. The API
# server then rejects the pod synchronously ("forbidden: violates PodSecurity
# restricted:latest"), the Function never reaches Healthy, and EVERY Composition
# that runs through it (WorkloadIdentity -> ACK Role) fails with
# "rpc error: DeadlineExceeded: no children to pick from".
#
# crossplane.tf already supplies these fields to Crossplane's OWN pods via chart
# values (podSecurityContext{Crossplane,RBACManager}); FUNCTION pods are separate
# packages with their own runtime Deployment, so they need this DRC.
#
# Live-diagnosed 2026-06-18 (WS3 staging bring-up #2): the auto `default` DRC was
# empty -> function 0/1 Running -> composite never rendered -> ACK Role never
# created -> engine IRSA role absent -> engine model-fetch AccessDenied. Patching
# this securityContext in flipped the function to Healthy and unblocked the chain.
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: aegis-function-runtime
  annotations:
    aegis.binhsu.org/adr: "ADR-09 Phase 3"
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            # Numeric UID is REQUIRED, not just runAsNonRoot: the function image's
            # USER is the non-numeric name "nonroot", so with runAsNonRoot alone the
            # kubelet cannot verify the user is non-root and fails the pod with
            # CreateContainerConfigError ("image has non-numeric user (nonroot),
            # cannot verify user is non-root"). 65532 is the distroless nonroot UID.
            # (Live-diagnosed 2026-06-18 bring-up #3, after the PSA fix landed.)
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: package-runtime
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65532
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
---
# DRC named `default` — Crossplane auto-applies this to any Provider that does
# NOT set an explicit runtimeConfigRef. Under fix B (live-proven 2026-06-18)
# that is the auto-installed dependency `upbound-provider-family-aws`, pulled in
# when provider-aws-iam installs. The family provider makes no IAM calls and
# holds no creds, so this DRC supplies only the restricted-PSA securityContext
# crossplane-system enforces — without it the family pod is rejected with
# "forbidden: violates PodSecurity restricted:latest" and provider-aws-iam never
# reaches Healthy (its ProviderConfig CRD depends on the family package).
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: default
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
            - name: package-runtime
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                runAsNonRoot: true
                runAsUser: 65532
                seccompProfile:
                  type: RuntimeDefault
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
---
# DRC named `provider-aws-iam-runtime` — bound to the provider-aws-iam Provider
# via its runtimeConfigRef (fix B, live-proven 2026-06-18). Two jobs:
#   1. Same restricted-PSA securityContext the namespace enforces.
#   2. A STABLE serviceAccount name (`provider-aws-iam`) carrying the IRSA
#      role-arn annotation. The name is load-bearing: the reused role
#      (irsa-ack-iam.tf) trusts subject
#      `system:serviceaccount:crossplane-system:provider-aws-iam`. Let Crossplane
#      auto-name the SA and the trust subject no longer matches → AssumeRole 403.
# The role ARN is templated from .Values.providerRoleArn (crossplane.tf passes
# module.irsa_ack_iam.arn).
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-aws-iam-runtime
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-aws-iam
      annotations:
        eks.amazonaws.com/role-arn: {{ .Values.providerRoleArn | quote }}
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
            - name: package-runtime
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                runAsNonRoot: true
                runAsUser: 65532
                seccompProfile:
                  type: RuntimeDefault
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
