# Crossplane Function package — the patch-and-transform DSL Compositions in
# this chart use. We deliberately stay on this single Function (not
# function-go-templating, not KCL) per ADR-09: the WorkloadIdentity trust
# policy is a fixed template with two DNS-1123 substitutions (namespace, SA
# name), which CombineFromComposite + string.fmt handle without templating
# logic. Adopt go-templating only when a Composition actually needs branching
# or loops.
#
# Version pin: 0.10.x is the current stable line tracking Crossplane v1.20.
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-patch-and-transform
  annotations:
    aegis.binhsu.org/adr: "ADR-09 Phase 3"
    aegis.binhsu.org/status: "implemented, E2E PENDING platform bootstrap"
spec:
  package: xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform:v0.10.6
  # Run the function pod under a restricted-PSA-compliant securityContext.
  # crossplane-system enforces PSA=restricted (crossplane.tf); without this the
  # function pod is rejected, the Function never goes Healthy, and every
  # Composition that uses it fails to render. See deploymentruntimeconfig.yaml.
  runtimeConfigRef:
    apiVersion: pkg.crossplane.io/v1beta1
    kind: DeploymentRuntimeConfig
    name: aegis-function-runtime
